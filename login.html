<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Вход | ArtGallery</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <link rel="stylesheet" href="style.css">
    <link rel="icon" type="image/svg+xml" href="img/logo.svg">
</head>
<body>
    <div class="container mx-auto mt-5 pt-5 px-3">
        <div class="login-card" style="max-width: 400px; margin: 0 auto;">
            <div class="login-logo text-center mb-4">
                <img src="img/logo.svg" alt="ArtGallery" style="width: 80px; height: 80px;">
                <h1 class="mt-2" style="color: #642226; font-size: 1.8rem;">ArtGallery</h1>
            </div>
            <form id="loginForm">
                <div class="mb-3">
                    <div class="input-group">
                        <span class="input-group-text bg-white border-end-0" style="border-radius: 30px 0 0 30px;"><i class="fas fa-envelope text-secondary"></i></span>
                        <input type="text" class="form-control border-start-0" id="login" placeholder="Логин / Email" required style="border-radius: 0 30px 30px 0; padding: 12px 20px;">
                    </div>
                </div>
                <div class="mb-3">
                    <div class="input-group">
                        <span class="input-group-text bg-white border-end-0" style="border-radius: 30px 0 0 30px;"><i class="fas fa-lock text-secondary"></i></span>
                        <input type="password" class="form-control border-start-0" id="password" placeholder="Пароль" required style="border-radius: 0 30px 30px 0; padding: 12px 20px;">
                    </div>
                </div>
                <button type="submit" class="btn-primary-custom w-100 py-2"><i class="fas fa-sign-in-alt me-2"></i>Войти</button>
            </form>
            <hr>
            <p class="text-center mb-0">Нет аккаунта? <a href="#" onclick="showRegisterModal()" style="color: #642226;"><i class="fas fa-user-plus me-1"></i>Зарегистрироваться</a></p>
        </div>
    </div>

    <div class="custom-modal" id="registerModal">
        <div class="custom-modal-dialog">
            <div class="custom-modal-content">
                <div class="custom-modal-header border-0">
                    <h2 class="custom-modal-title"><i class="fas fa-user-plus me-2"></i> Регистрация</h2>
                    <button class="btn-close-modal" onclick="closeModal('registerModal')">✕</button>
                </div>
                <div class="custom-modal-body">
                    <form id="regForm">
                        <div class="mb-3"><label class="form-label"><i class="fas fa-user me-1"></i>Имя</label><input type="text" class="form-control" id="regName" required placeholder="Иван Иванов"></div>
                        <div class="mb-3"><label class="form-label"><i class="fas fa-envelope me-1"></i>Email</label><input type="email" class="form-control" id="regEmail" required placeholder="example@mail.ru"></div>
                        <div class="mb-3"><label class="form-label"><i class="fas fa-phone me-1"></i>Телефон</label><input type="tel" class="form-control" id="regPhone" required placeholder="+7 (___) ___-__-__"></div>
                        <div class="mb-3"><label class="form-label"><i class="fas fa-lock me-1"></i>Пароль</label><input type="password" class="form-control" id="regPassword" required placeholder="минимум 6 символов"></div>
                        <div class="mb-3"><label class="form-label"><i class="fas fa-lock me-1"></i>Подтверждение пароля</label><input type="password" class="form-control" id="regConfirmPassword" required></div>
                        <button type="submit" class="btn-primary-custom w-100"><i class="fas fa-check-circle me-2"></i>Зарегистрироваться</button>
                    </form>
                    <hr>
                    <p class="text-center mb-0">Уже есть аккаунт? <a href="#" onclick="closeModal('registerModal'); showLoginModal(); return false;"><i class="fas fa-sign-in-alt me-1"></i>Войти</a></p>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>
    <script src="main.js"></script>
</body>
</html>
